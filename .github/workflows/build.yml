name: Build OpenIPC Firmware

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git make libncurses5-dev libssl-dev bc \
            flex bison u-boot-tools libelf-dev wget cpio rsync unzip file \
            python3 python3-pip whiptail

      - name: Clone firmware
        run: git clone --depth=1 https://github.com/OpenIPC/firmware.git openipc

      - name: Copy overlay
        run: |
          cp -r devices/gk7205v300_ultimate_dzhukow/* openipc/

      - name: Build firmware
        run: |
          cd openipc
          make BOARD=gk7205v300_ultimate_dzhukow

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v3
        with:
          name: firmware
          path: |
            openipc/output/images/*
